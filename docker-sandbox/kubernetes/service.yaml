apiVersion: v1
kind: Service
metadata:
  name: cocapn
  namespace: cocapn
  labels:
    app: cocapn
spec:
  type: ClusterIP
  selector:
    app: cocapn
  ports:
    - name: http
      port: 3100
      targetPort: http
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
