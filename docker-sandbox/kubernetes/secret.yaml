apiVersion: v1
kind: Secret
metadata:
  name: cocapn-secrets
  namespace: cocapn
type: Opaque
stringData:
  # Required: at least one LLM API key
  DEEPSEEK_API_KEY: "sk-your-deepseek-key"
  # Optional: uncomment and fill as needed
  # OPENAI_API_KEY: "sk-your-openai-key"
  # ANTHROPIC_API_KEY: "sk-your-anthropic-key"
